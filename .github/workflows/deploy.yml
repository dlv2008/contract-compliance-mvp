name: deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/dlv2008/contract-compliance-mvp-api
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        run: |
          scp -P "${{ secrets.DEPLOY_PORT }}" \
            infra/deploy/compliance-app/docker-compose.prod.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/stacks/compliance-app/docker-compose.prod.yml"

      - name: Deploy on server
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "export IMAGE_TAG=${{ github.sha }} GHCR_PULL_TOKEN='${{ secrets.GHCR_PULL_TOKEN }}'; \
             echo \"\$GHCR_PULL_TOKEN\" | docker login ghcr.io -u dlv2008 --password-stdin && \
             cd /opt/stacks/compliance-app && \
             docker compose -f docker-compose.prod.yml pull && \
             docker compose -f docker-compose.prod.yml up -d"
