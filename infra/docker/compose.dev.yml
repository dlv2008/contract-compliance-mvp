services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: contract_compliance
      POSTGRES_USER: contract_app
      POSTGRES_PASSWORD: contract_app_dev
    ports:
      - "15432:5432"
    volumes:
      - contract-compliance-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract_app -d contract_compliance"]
      interval: 5s
      timeout: 3s
      retries: 12

  compliance-api:
    build:
      context: ../../apps/api
    environment:
      CONTRACT_COMPLIANCE_TASK_STORE_BACKEND: postgres
      CONTRACT_COMPLIANCE_DATABASE_URL: postgresql://contract_app:contract_app_dev@postgres:5432/contract_compliance
      CONTRACT_COMPLIANCE_OBJECT_STORAGE: local
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  contract-compliance-postgres:
