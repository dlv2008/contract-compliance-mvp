<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrendBot 服务迁移中</title>
  <style>
    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", sans-serif;
      background: #f4f1e8;
      color: #1e2430;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 720px;
      background: #fffaf0;
      border: 1px solid #d9d1c2;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(30, 36, 48, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.2;
    }
    p {
      margin: 8px 0;
      font-size: 17px;
      color: #50586a;
    }
    .tag {
      display: inline-block;
      margin-bottom: 16px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #1f4d3a;
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.04em;
    }
    .note {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid #e5dece;
      font-size: 14px;
      color: #6a7282;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="tag">TREND BOT</div>
      <h1>服务迁移中</h1>
      <p>当前站点正在进行基础设施整理与系统升级。</p>
      <p>后续将切换为新的合同合规审查工作台与知识服务入口。</p>
      <div class="note">维护窗口：2026-05-28。期间旧演示入口已下线。</div>
    </div>
  </div>
</body>
</html>
